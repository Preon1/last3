services:
  # Reverse proxy: terminates HTTPS (Let's Encrypt) on :443 and proxies to lrcom.
  caddy:
    build:
      context: .
      dockerfile: ./caddy/Dockerfile
    image: lrcom-caddy:local
    restart: unless-stopped
    logging:
      driver: none
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # Set these in your .env on the server.
      - LRCOM_DOMAIN=${LRCOM_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - lrcom

  # App: keep it internal; Caddy exposes it publicly.
  lrcom:
    build:
      args:
        - VITE_WEBTRANSPORT_URL=${VITE_WEBTRANSPORT_URL:-https://${LRCOM_DOMAIN}:8444/wt}
        - VITE_REQUIRE_WEBTRANSPORT=${VITE_REQUIRE_WEBTRANSPORT:-1}
    restart: unless-stopped
    ports:
      - "${WEBTRANSPORT_PORT:-8444}:${WEBTRANSPORT_PORT:-8444}/udp"
    expose:
      - "8443"
      - "${WEBTRANSPORT_PORT:-8444}/udp"

  # TURN: still needs to be reachable by clients.
  coturn:
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
