services:
  # Reverse proxy: terminates HTTPS (self-signed) on :443 and proxies to lrcom.
  caddy:
    build:
      context: .
      dockerfile: ./caddy/Dockerfile
    image: lrcom-caddy:local
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - LRCOM_DOMAIN=localhost
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - ./certs/cert.pem:/etc/caddy/cert.pem:ro
      - ./certs/key.pem:/etc/caddy/key.pem:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - lrcom

  # App: exposed directly for local debugging + via Caddy
  lrcom:
    build:
      context: .
      args:
        - VITE_WEBTRANSPORT_URL=${VITE_WEBTRANSPORT_URL:-https://localhost:8444/wt}
        - VITE_REQUIRE_WEBTRANSPORT=${VITE_REQUIRE_WEBTRANSPORT:-1}
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "${WEBTRANSPORT_PORT:-8444}:${WEBTRANSPORT_PORT:-8444}/udp"
    environment:
      - APP_NAME=${LRCOM_APP_NAME:-Last}
      - HOST=0.0.0.0
      - PORT=8443
      - WEBTRANSPORT_ENABLED=${WEBTRANSPORT_ENABLED:-1}
      - WEBTRANSPORT_HOST=0.0.0.0
      - WEBTRANSPORT_PORT=${WEBTRANSPORT_PORT:-8444}
      - WEBTRANSPORT_PATH=/wt
      - WEBTRANSPORT_SECRET=${WEBTRANSPORT_SECRET:-}
      - AUTO_TLS=1
      - TLS_SANS=${LRCOM_TLS_SANS:-DNS:localhost,IP:127.0.0.1}
      - TURN_URLS=turn:${LRCOM_TURN_HOST:-localhost}:3478?transport=udp,turn:${LRCOM_TURN_HOST:-localhost}:3478?transport=tcp
      - TURN_SECRET=${LRCOM_TURN_SECRET:-change-me}
      - TURN_USERNAME_TTL_SECONDS=3600
      - TURN_RELAY_MIN_PORT=${LRCOM_TURN_MIN_PORT:-49160}
      - TURN_RELAY_MAX_PORT=${LRCOM_TURN_MAX_PORT:-49169}
      - STARTUP_LOG=1
      - DEBUG=${DEBUG:-false}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@localhost}
      - SIGNED_CLEANUP_ENABLED=${SIGNED_CLEANUP_ENABLED:-1}
      - SIGNED_CLEANUP_INTERVAL_MS=${SIGNED_CLEANUP_INTERVAL_MS:-600000}
      - SIGNED_CLEANUP_INITIAL_DELAY_MS=${SIGNED_CLEANUP_INITIAL_DELAY_MS:-30000}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-lrcom}
      - POSTGRES_USER=${POSTGRES_USER:-lrcom}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      coturn:
        condition: service_started

  postgres:
    image: postgres:18.1-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_destination=stderr
      - -c
      - log_statement=all
      - -c
      - log_duration=on
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_min_messages=notice
      - -c
      - log_min_error_statement=notice
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-lrcom}
      - POSTGRES_USER=${POSTGRES_USER:-lrcom}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lrcom} -d ${POSTGRES_DB:-lrcom}"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:4.6.2
    restart: unless-stopped
    environment:
      - LRCOM_TURN_EXTERNAL_IP=${LRCOM_TURN_EXTERNAL_IP:-}
    command:
      - sh
      - -c
      - |
        turnserver -n \
          --log-file=stderr \
          --no-stdout-log \
          --use-auth-secret \
          --static-auth-secret=${LRCOM_TURN_SECRET:-change-me} \
          --realm=lrcom \
          --no-cli \
          --no-tls \
          --no-dtls \
          --listening-ip=0.0.0.0 \
          ${LRCOM_TURN_EXTERNAL_IP:+--external-ip=$LRCOM_TURN_EXTERNAL_IP} \
          --min-port=${LRCOM_TURN_MIN_PORT:-49160} \
          --max-port=${LRCOM_TURN_MAX_PORT:-49169}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "${LRCOM_TURN_MIN_PORT:-49160}-${LRCOM_TURN_MAX_PORT:-49169}:${LRCOM_TURN_MIN_PORT:-49160}-${LRCOM_TURN_MAX_PORT:-49169}/udp"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  default:
    driver: bridge